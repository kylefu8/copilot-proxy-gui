appId: com.kylefu8.copilot-proxy-gui
productName: Copilot Proxy GUI
copyright: Copyright © 2024-2026

directories:
  buildResources: build
  output: release

# Files included in the asar archive
files:
  - electron/**/*
  - dist/**/*
  - "!node_modules"

# Extra resources shared by all platforms (JS bundle – cross-platform)
extraResources:
  - from: build/copilot-proxy-bundle.mjs
    to: copilot-proxy-bundle.mjs

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
    - target: dir
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  artifactName: "${productName}-${version}-setup.exe"

mac:
  target: dmg
  icon: build/icon.icns
  category: public.app-category.developer-tools
  identity: null

afterPack: scripts/afterPack.cjs

dmg:
  artifactName: "${productName}-${version}-${arch}.dmg"
  writeUpdateInfo: false

portable:
  artifactName: "${productName}-${version}-portable.exe"

# Don't publish anywhere (we upload to GitHub Releases manually or via CI)
publish: null

# Disable blockmap generation to prevent DMG corruption
generateUpdatesFilesForAllChannels: false
